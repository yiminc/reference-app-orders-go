apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: main-worker
    app.kubernetes.io/name: oms
  name: main-worker
  namespace: oms
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: main-worker
      app.kubernetes.io/name: oms
  template:
    metadata:
      labels:
        app.kubernetes.io/component: main-worker
        app.kubernetes.io/name: oms
    spec:
      containers:
        - args:
            - -k
            - supersecretkey
            - -s
            - order,shipment,billing
          env:
            - name: BILLING_API_URL
              value: http://billing-api:8081
            - name: ORDER_API_URL
              value: http://main-api:8082
            - name: SHIPMENT_API_URL
              value: http://main-api:8083
            - name: TEMPORAL_ADDRESS
              value: temporal-frontend.temporal:7233
            - name: FRAUD_API_URL
              value: http://billing-api:8084
          image: ghcr.io/temporalio/reference-app-orders-go-worker:latest
          name: main-worker
          imagePullPolicy: Always
          resources:
            limits:
              cpu: "100m"
              memory: "100Mi"
            requests:
              cpu: "100m"
              memory: "100Mi"
      enableServiceLinks: false
